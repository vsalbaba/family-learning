version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - app-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/family_learning.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PARENT_PIN=${PARENT_PIN:-1234}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  app-data:
